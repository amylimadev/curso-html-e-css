<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*  SELETORES PERSONALIZADOS
          #  = id
          .  = class
          :  = pseudo-class
          :: = psaudo-element
          >  = clildren
        */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color:blue;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color:cornflowerblue;
        }

        a:hover {
            color:lightskyblue ;
            text-decoration: underline;
        }

        a:active {
            color: black;
        }

        .especial {
            background-color: rgb(140, 247, 255) ;
        }

        .especial::before {
            content:  ' \2192';
        }

        .especial::after {
            content:  ' \2190';
        }
    </style>
</head>
<body>
    <h1>Personalizado Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io"target="_blank">Repositorio GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/"class="especial">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com"class="especial">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
