<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios de Tabelas</title>
    <style>       
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }
    </style>
</head>
<body>
    <h1>Exercicio de Tabela</h1>

    <table>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissao</th>
        </tr>
        <tr>
            <td>Ana Maria Braga</td>
            <td>F</td>
            <td>77</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Tatá Werneck</td>
            <td>F</td>
            <td>42</td>
            <td>Humorista</td>
        </tr>
        <tr>
            <td>Xuxa Meneghel</td>
            <td>F</td>
            <td>63</td>
            <td>Cantora</td>
        </tr>
        <tr>
            <td>Luciano Huck</td>
            <td>H</td>
            <td>54</td>
            <td>Apresentador</td>
        </tr>
        <tr>
            <td>Gusttavo Lima</td>
            <td>H</td>
            <td>36</td>
            <td>Cantor</td>
        </tr>
        <tr>
            <td>Neymar da Silva Santos Jr</td>
            <td>H</td>
            <td>34</td>
            <td>Jogador de Futebol</td>
        </tr>
    </table>
</body>
</html>
