<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /* Configuraçoes globais das CSS */
            height: 100%;
        }

        body {
            background-image: linear-gradient(to bottom, #7F0BFD, #FC01D8, #FE0A64, #FE5C0A, #FFB901);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
     <h1 style="color: rgb(255, 255, 255);">Testando Gradiente</h1>
</body>
</html>
